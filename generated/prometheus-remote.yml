# Prometheus config for 022-opentelemetry
# Scrapes OTEL Collector's Prometheus exporter (metrics from OTLP pipeline)
# and each service's /actuator/prometheus (Micrometer) for dashboard data.
# Run from observability stack: docker compose up -d
# Tailscale hostnames (e.g. moneytree-backend.tailce422e.ts.net) must be resolvable from the Prometheus container.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  # OpenTelemetry Collector exposes OTel metrics as Prometheus format at :8889
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics

  # Spring Boot services: Micrometer Prometheus (application label = service name)
  - job_name: 'moneytree-backend'
    static_configs:
      - targets: ['moneytree-backend.tailce422e.ts.net:8080']
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
  - job_name: 'moneytree-gateway'
    static_configs:
      - targets: ['moneytree-gateway.tailce422e.ts.net:8080']
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
